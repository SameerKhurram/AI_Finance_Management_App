name: Flutter Test Workflow

on:
    push:
        branches:
            - main

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: stable
                  flutter-version: 3.19.0
                  cache: false

            - name: Check Flutter version
              run: flutter --version

            - name: Install dependencies
              run: flutter pub get

            - name: Analyze code
              run: flutter analyze || true
